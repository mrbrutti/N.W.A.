name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Verify formatting
        if: ${{ hashFiles('go.mod') != '' }}
        run: |
          files=$(find . -name '*.go' -not -path './vendor/*')
          test -z "$(gofmt -l $files)"

      - name: Verify frontend script syntax
        if: ${{ hashFiles('web/js/app.js') != '' }}
        run: node --check web/js/app.js

      - name: Run Go tests
        if: ${{ hashFiles('go.mod') != '' }}
        run: go test ./...
